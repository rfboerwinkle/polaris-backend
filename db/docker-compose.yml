services:
  mysql:
    image: mysql:8
    container_name: polaris-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: polaris
      MYSQL_DATABASE: chinese_checkers
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
volumes:
  mysql_data: 